<!DOCTYPE html>
<html lang="es">
<head>
    
    <title>17_Izabella_Perez_Animacion</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        
        align-items: center;
        margin-top: 50px;
        background-image: url("fondo.jpg");
        background-size: cover;
        position: relative;
    }
   .padre {
        width: 1900px;
        height: 890px;
        background-color: rgba(0, 0, 0, 0);
        
        position: relative;
    }
    .caja {
        width: 1890px;
        height: 250px;
        background-color: rgba(178, 133, 204, 0.638);
        opacity: 0;
        position: absolute;
        font-weight: bold;
        display: flex;
        justify-content: center; 
        align-items: center;  
        font-size: 56px;
    }
    .stitch {
            width: 200px;
            height: 200px;
            background-image: url("https://lumiere-a.akamaihd.net/v1/images/stitch_800x600_7c896288.png?region=100,0,600,600");
            background-size: cover;
            position: absolute;
            top: -200px;
            right: -150px;
            
        }
    .lilo {
            width: 200px;
            height: 300px;
            background-image: url("https://www.pngkey.com/png/full/503-5038955_lilo-y-stitch-lilo-and-stitch-lilo.png");
            background-size: cover;
            position: absolute;
            bottom: -300px;
            right: 600px;
            
        }
    .nave {
            width: 350px;
            height: 170px;
            background-image: url("https://i.pinimg.com/originals/40/b4/3a/40b43abbe48191167fb311bd0f39b9b9.png");
            background-size: cover;
            position: absolute;
            top: -200px;
            right: -150px;
            
        }
    
    .flash {
            width: 0px;
            height: 150px;
            position: absolute;
            top: -200px;
            right: -150px;          
            border-left: 100px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 100px solid rgba(237, 241, 143, 0.901);
        }
    
    .msjs {
            width: 200px;
            height: 65px;
            background-color: rgb(255, 255, 255);
            border-radius: 15px;
            position: absolute;
            top: 90%;
            right: 50%;
            text-align: center;
            justify-content: center;
            font-size: 26px;
            color: #0254d7;
            opacity: 0;
        }
    .msjs2 {
            width: 150px;
            height: 100px;
            background-color: rgb(255, 255, 255);
            border-radius: 15px;
            position: absolute;
            top: 90%;
            right: 50%;
            text-align: center;
            justify-content: center;
            font-size: 26px;
            color: #0254d7;
            opacity: 0;
        }
    .msjs3 {
            width: 200px;
            height: 33px;
            background-color: rgb(255, 255, 255);
            border-radius: 15px;
            position: absolute;
            top: 90%;
            right: 50%;
            text-align: center;
            justify-content: center;
            font-size: 26px;
            color: #0254d7;
            opacity: 0;

        }
    .hmna {
            width: 200px;
            height: 300px;
            background-image: url("https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/416474ba-7818-4241-8e82-32a7caded352/digi8pe-419f8eea-c018-40c6-8c4c-ab518f6dcff2.png/v1/fill/w_323,h_486/png_nani_pelekai_by_mikemoon1990_digi8pe-fullview.png?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7ImhlaWdodCI6Ijw9NDg2IiwicGF0aCI6Ii9mLzQxNjQ3NGJhLTc4MTgtNDI0MS04ZTgyLTMyYTdjYWRlZDM1Mi9kaWdpOHBlLTQxOWY4ZWVhLWMwMTgtNDBjNi04YzRjLWFiNTE4ZjZkY2ZmMi5wbmciLCJ3aWR0aCI6Ijw9MzIzIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmltYWdlLm9wZXJhdGlvbnMiXX0.SF9T0LGQD_XqLjTt_HwuGyie7y9D1ISMUmwTy41AvAo");
            background-size: cover;
            position: absolute;
            bottom: 200px;
            left: 380px;
            opacity: 0;
            
        }
    body:hover .nave {
            
            animation-name: moverNave;
            animation-duration: 4s;
            animation-timing-function: ease-out;
            animation-fill-mode: forwards;
        }
    body:hover .stitch {
            animation-name: moverStitch;
            animation-duration: 3s;
            animation-timing-function: ease-out;
            animation-fill-mode: forwards;
        }
    body:hover .flash {
            animation-name: moverFlash;
            animation-duration: 3s;
            animation-timing-function: ease-out;
            animation-fill-mode: forwards;
        }
    body:hover .msjs {
            animation-name: mostrarMSJ;
            animation-duration: 5s;
            animation-timing-function: ease-out;
            animation-fill-mode: forwards;
        }
    body:hover .lilo {
            animation-name: moverLilo;
            animation-duration: 7s;
            animation-timing-function: ease-out;
            animation-fill-mode: forwards;
        }
    body:hover .hmna {
            animation-name: moverNani;
            animation-duration: 10s;
            animation-timing-function: ease-out;
            animation-fill-mode: forwards;
        }
    body:hover .msjs2 {
            animation-name: msj2;
            animation-duration: 8s;
            animation-timing-function: ease-out;
            animation-fill-mode: forwards;
        }
    body:hover .msjs3 {
            animation-name: msj3;
            animation-duration: 11s;
            animation-timing-function: ease-out;
            animation-fill-mode: forwards;
        }
    body:hover .caja {
            animation-name: mostrarCaja;
            animation-duration: 12s;
            animation-timing-function: ease-out;
            animation-fill-mode: forwards;
        }
@keyframes moverStitch {
    0% {
        top: -150px;
        right: -70px;
        transform: scale(0.2);
        opacity: 0;
    }

    50% {
        top: 35%;
        right: 25%;
        transform: translate(-30px, 175px);
        }
    100%{
        top: 100%;
        right: 50%;
        transform: translateY(-300px) scale(1.1);
    }
}
@keyframes moverNave {
    
    0% {
        top: -150px;
        right: -100px;

    }

    50% {
        top: 25%;
        right: 25%;
        transform: translateY(50px);
        animation-play-state: paused;
    }
    100% {
        top: -300px;
        right: 120%;
        transform: translateX(100%);
    }
}
@keyframes moverFlash {
    0% {
        top: -200px;
        right: -150px;
        width: 0;
        height: 0;
        opacity: 1;
    }
    50% {
        top: 23%;
        right: 25%;
        width: 0;
        height: 250px;
        border-left: 150px solid transparent;
        border-right: 70px solid transparent;
        border-bottom: 250px solid rgba(237, 241, 143, 0.901);
        opacity: 0.8;
        transform: translate(-70px, -70px) scale(1.5) ;
    }
    52% {
        top: 25%;
        right: 25%;
        width: 0;
        height: 0;
        opacity: 0;
        transform:  scale(0) ;
    }
    100% {
        top: 25%;
        right: 25%;
        width: 0;
        height: 0;
        opacity: 0;
        transform: scale(0);
    }
}
@keyframes mostrarMSJ {
    0% {
        top: 90%;
        right: 50%;
        transform: translateY(-300px) scale(0);
        opacity: 0;
    }
    85% {
        top: 90%;
        right: 50%;
        opacity: 0;
       
    }
    100% {
        top: 90%;
        right: 50%;
        opacity: 1;
        transform: translateY(-300px) ;
    }
}
@keyframes moverLilo {
    
    0% {
        bottom: -300px;
        right: 600px;
        opacity: 0;
    }
    50% {
        opacity: 0;
    }
        
    100% {
        opacity: 1;
        bottom: 10%;
        right: 45%;
        transform: translateY(40px) translateX(70px) scale(0.8);
    }
}
@keyframes msj2 {
    0% {
        top: 60%;
        right: 40%;
        transform: translateY(30px) scale(0);
        opacity: 0;
    }
    95% {
        top: 50%;
        right: 41%;
        opacity: 0;
       
    }
    100% {
        top: 56%;
        right: 42%;
        opacity: 1;
        transform: translateY(-30px) ;
    }
}
@keyframes moverNani {
    
    0% {
        bottom: 350px;
        left: 250px;
        opacity: 0;
    }
    86% {
        opacity: 0.3;
    }
    100% {
        opacity: 1;
        bottom: 175px;
        left: 420px;
        transform: translateY(40px) translateX(70px) scale(1.5);
    }
}
@keyframes msj3 {
    0% {
        top: 40%;
        left: 415px;
        opacity: 0;
    }
    85% {
        top: 35%;
        left: 415px;
        opacity: 0;
    }
    100% {
        opacity: 1;
        top: 35%;
        left: 420px;
        transform: translateY(40px) translateX(70px) ;
    }
}     
@keyframes mostrarCaja {
    0% {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
    }
    95% {
        top: 50%;
        left: 50%;
        opacity: 0;
       
    }
    100% {
        top: 50%;
        left: 50%;
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
}
</style>
<body>
    <div class="padre">
        <div class="nave"></div>
        <div class="stitch"></div>
        <div class="flash"></div>
        <div class="msjs">¡Ohana significa "familia" ..</div>
        <div class="lilo"></div>
        <div class="msjs2">Y tu familia nunca te abandona..</div>
        <div class="hmna"></div>
        <div class="msjs3">ni te olvida !</div>
        <div class="caja"> Gracias Por Su Atención</div>
    </div>
</body>
</html>
